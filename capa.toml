# audit-trail-reporter package manifest.
#
# All three seed libraries are now standalone repos consumed
# via the package manager. `capa install` materialises them
# under ./vendor/.

[package]
name = "audit-trail-reporter"
version = "0.2.0"
capa = ">=0.8.4"

[dependencies]
capa_cli      = { git = "https://github.com/nelsonduarte/capa_cli",      tag = "v0.1" }
capa_datetime = { git = "https://github.com/nelsonduarte/capa_datetime", tag = "v0.1" }
capa_log      = { git = "https://github.com/nelsonduarte/capa_log",      tag = "v0.1" }
