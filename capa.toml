# audit-trail-reporter package manifest.
#
# capa_log is fetched from its standalone repo and materialised
# under ./vendor/ by `capa install`. capa_cli and capa_datetime
# still vendor by hand under ./libraries/ (path-source deps)
# until those seed libraries are also extracted; both forms work
# side-by-side.

[package]
name = "audit-trail-reporter"
version = "0.2.0"
capa = ">=0.8.4"

[dependencies]
capa_cli      = { path = "libraries/capa_cli" }
capa_datetime = { path = "libraries/capa_datetime" }
capa_log      = { git = "https://github.com/nelsonduarte/capa_log", tag = "v0.1" }
